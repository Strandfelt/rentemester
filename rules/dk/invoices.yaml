version: dk-invoices-v0.0.7
sources:
  - DK-MOMSBEKENDTGORELSEN-2023-1435
  - DK-MOMSLOVEN-2024-209
  - DK-RENTELOVEN-2014-459
  - DK-UDENRETLIGE-INDDRIVELSESOMKOSTNINGER-AMEND-2013-105
  - DK-OFFENTLIGE-BETALINGER-2007-798
rules:
  - rule_id: DK-INVOICE-FULL-001
    name: Full invoice must contain core seller/buyer/date/number/content fields
    category: invoice_validation
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    provisions:
      - ref: "§ 58, stk. 1"
        text_hash: "sha256:04629844bae235a49e49aaa95f21e625e1a8bbca1c51bccc0604cc20a3bdb97a"
      - ref: "§ 58, stk. 1, nr. 1"
        text_hash: "sha256:4463074fada169cd88e0291f97ebdf745ea34313ef80367d6cb5290c28bfffcd"
      - ref: "§ 58, stk. 1, nr. 2"
        text_hash: "sha256:9908ba73ceb7a4bae7d4b0b205d2bc1d4f96ee8618ecc0487ea8822872e9c0a6"
      - ref: "§ 58, stk. 1, nr. 3"
        text_hash: "sha256:d54964a3131ee814ebb54da5b83d20a2e176af65727f6a3fbe962e33f8bf64c6"
      - ref: "§ 58, stk. 1, nr. 4"
        text_hash: "sha256:181efbfec0d47a7be280304e056b1c2e641555e6b3e7ccc7c21e059beb3e6f6b"
      - ref: "§ 58, stk. 1, nr. 5"
        text_hash: "sha256:16d656787bb9c323ef4d2c9790c5ea0efd0966ff6d14a6e3f7838690121cf158"
      - ref: "§ 58, stk. 1, nr. 7"
        text_hash: "sha256:fbf5c12a82de96cc008148a8bf4b77c284e520ab3b983d3e93e8701f16398cf9"
      - ref: "§ 58, stk. 1, nr. 8"
        text_hash: "sha256:b3b34287303c4a5f0277a3f0eeb7f5463387c95a96b0d70bed93574c99fe3992"
      - ref: "§ 58, stk. 1, nr. 9"
        text_hash: "sha256:090223e9a56ea922e65eb53deb4ebd9a9bc20db57199ce2af4ffa83253da4670"
    severity: hard_stop
    machine_rule:
      require:
        - invoice_date
        - sequential_invoice_number
        - seller_name_address
        - seller_vat_or_cvr
        - buyer_name_address
        - goods_or_services_description
        - vat_base
        - vat_rate
        - vat_amount
        - total_amount
    explanation: Rentemester must reject issuing or deducting VAT from invoices that lack required full-invoice fields.
  - rule_id: DK-INVOICE-SIMPLIFIED-001
    name: Simplified invoice is only allowed up to DKK 3,000 gross and needs the reduced field set
    category: invoice_validation
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    provisions:
      - ref: "§ 66, stk. 1"
        text_hash: "sha256:40b7167b428477997204c7760bd21f32d7b805f92fbc1ed5af49daed55b4db99"
      - ref: "§ 66, stk. 1, nr. 1"
        text_hash: "sha256:65e2c36333d63c78a7a8519acda7e83eff79ce9ae817a1665b3a53ca2c3a363b"
      - ref: "§ 66, stk. 1, nr. 2"
        text_hash: "sha256:08d364f094d18954be4f5f7cbde06189c901f424f59f079d47c4eac0b864807c"
      - ref: "§ 66, stk. 1, nr. 3"
        text_hash: "sha256:df1452d54aea336fbc99df5917980d748d7a1ee167f1bfb64423fb30e7a21911"
      - ref: "§ 66, stk. 1, nr. 4"
        text_hash: "sha256:b4ee711947827b55e13cd2a08a731cdefd384ff2e7710a5a983854d1141726bd"
      - ref: "§ 66, stk. 1, nr. 5"
        text_hash: "sha256:583e2cfe5df1765dbc888db1737ef06fb0edca36d34672a38992933d84ef5f21"
    severity: hard_stop
    machine_rule:
      condition: invoice_type == 'simplified'
      require:
        - gross_amount_lte_3000_dkk
        - invoice_date
        - sequential_invoice_number
        - seller_name_address
        - seller_vat_or_cvr
        - goods_or_services_description
        - total_amount
        - vat_amount_or_20pct_of_gross_basis
    explanation: Rentemester must reject simplified invoices above DKK 3,000 gross or without the mandatory reduced content set.
  - rule_id: DK-INVOICE-REVERSE-CHARGE-001
    name: Reverse-charge invoices must omit VAT amount/rate and include a reverse-charge note
    category: invoice_validation
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    provisions:
      - ref: "§ 59, stk. 1"
        text_hash: "sha256:2f8fec79698582aa822d0a91c30b12b0932e42bc04e4a120ec55a5511a0aa1b3"
      - ref: "§ 60, stk. 1"
        text_hash: "sha256:b00d554746fb7d423668afeada440ae77edc48fe3eb107472d66aff9cc604945"
    severity: hard_stop
    machine_rule:
      condition: vat_treatment in ['domestic_reverse_charge', 'foreign_reverse_charge']
      require:
        - reverse_charge_basis
      forbid:
        - vat_rate
        - vat_amount
    explanation: Reverse-charge invoices are issued without VAT rate/amount and must clearly state the legal reverse-charge basis so the buyer can settle the VAT correctly.
  - rule_id: DK-INVOICE-REVERSE-CHARGE-BASIS-001
    name: Reverse-charge faktura skal angive den specifikke lovbestemmelse som fritagelsesgrundlag
    category: invoice_validation
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    provisions:
      - ref: "§ 60, stk. 1"
        text_hash: "sha256:b00d554746fb7d423668afeada440ae77edc48fe3eb107472d66aff9cc604945"
      - ref: "§ 62, stk. 1"
        text_hash: "sha256:e7b6d5902dcd7a2a46a0a2771174d3d502d843ef219e55183cdf320e8614592f"
    severity: hard_stop
    machine_rule:
      condition: vat_treatment in ['domestic_reverse_charge', 'foreign_reverse_charge']
      require:
        - reverse_charge_basis_from_enum
        - basis_matches_vat_treatment_direction
      forbid:
        - free_text_only_reverse_charge_note
    explanation: Rentemester must reject reverse-charge invoices unless they cite a structured legal basis that matches whether the reverse charge is domestic or foreign.
  - rule_id: DK-INVOICE-DELIVERY-DATE-001
    name: Faktura skal angive leveringsdato når den afviger fra udstedelsesdato
    category: invoice_validation
    source_id: DK-MOMSLOVEN-2024-209
    provisions:
      - ref: "§ 23, stk. 2"
        text_hash: "sha256:e29ceb8c88182ef2a3b0de41fa6d912d2bab381be061f805b53cacb834401b06"
    severity: hard_stop
    machine_rule:
      require:
        - delivery_date_or_period_is_valid_when_present
        - omitted_delivery_date_means_same_as_issue_date
      forbid:
        - malformed_delivery_date
        - malformed_delivery_period
    explanation: Rentemester must validate explicit delivery dates or delivery periods when they are present, while treating omission as delivery on the issue date.
  - rule_id: DK-INVOICE-ARITHMETIC-001
    name: Invoice line sums and totals must be arithmetically consistent before issue
    category: invoice_validation
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    provisions:
      - ref: "§ 58, stk. 1, nr. 7"
        text_hash: "sha256:fbf5c12a82de96cc008148a8bf4b77c284e520ab3b983d3e93e8701f16398cf9"
      - ref: "§ 58, stk. 1, nr. 9"
        text_hash: "sha256:090223e9a56ea922e65eb53deb4ebd9a9bc20db57199ce2af4ffa83253da4670"
    severity: hard_stop
    machine_rule:
      require:
        - line_total_equals_quantity_times_unit_price_when_present
        - net_total_equals_sum_of_lines_for_full_invoice
        - gross_total_equals_net_plus_vat_for_standard_vat
        - reverse_charge_gross_equals_net
      forbid:
        - inconsistent_invoice_totals
    explanation: Rentemester must reject invoices whose line amounts or VAT totals do not add up, and for non-DKK invoices the issued snapshot must also carry deterministic DKK mirror totals plus an explicit FX rate so later bookkeeping stays auditable.
  - rule_id: DK-INVOICE-ISSUE-001
    name: Issued invoices must be stored immutably with sequential invoice numbers
    category: invoice_integrity
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    provisions:
      - ref: "§ 58, stk. 1, nr. 2"
        text_hash: "sha256:9908ba73ceb7a4bae7d4b0b205d2bc1d4f96ee8618ecc0487ea8822872e9c0a6"
    severity: hard_stop
    machine_rule:
      require:
        - sequential_invoice_number
        - immutable_issued_snapshot
        - persisted_issue_timestamp
      forbid:
        - issue_without_validation
    explanation: Rentemester must only issue invoices after deterministic validation and must persist an immutable issued snapshot tied to a sequential invoice number; when the invoice currency is not DKK, the snapshot must include the chosen FX rate and DKK totals fixed at issue time.
  - rule_id: DK-MASTER-DATA-CUSTOMER-001
    name: Customer master data reused on invoices must resolve deterministically before issue
    category: invoice_integrity
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    provisions:
      - ref: "§ 58, stk. 1"
        text_hash: "sha256:04629844bae235a49e49aaa95f21e625e1a8bbca1c51bccc0604cc20a3bdb97a"
      - ref: "§ 58, stk. 1, nr. 4"
        text_hash: "sha256:181efbfec0d47a7be280304e056b1c2e641555e6b3e7ccc7c21e059beb3e6f6b"
    severity: hard_stop
    machine_rule:
      require:
        - customer_id_resolves_to_append_only_customer_record_when_used
        - resolved_customer_fields_materialized_into_issued_snapshot
      forbid:
        - issuing_invoice_with_missing_customer_lookup
    explanation: Rentemester may reuse stored customer master data, but the buyer fields used for an issued invoice must resolve deterministically at issue time and be materialized into the immutable invoice snapshot.
  - rule_id: DK-INVOICE-PUBLIC-RECIPIENT-001
    name: Public-recipient invoices must carry valid EAN/GLN metadata in the immutable buyer snapshot
    category: invoice_validation
    source_id: DK-OFFENTLIGE-BETALINGER-2007-798
    severity: hard_stop
    machine_rule:
      condition: buyer_public_recipient == true or buyer_ean_number_present == true
      require:
        - full_invoice_type
        - buyer_ean_number_is_13_digits
        - buyer_name_address
      forbid:
        - public_recipient_without_valid_ean_gln
    explanation: When an invoice is prepared for a Danish public recipient, Rentemester must keep the buyer EAN/GLN metadata deterministic in the issued snapshot and block malformed values before any downstream handoff/export.
  - rule_id: DK-INVOICE-PUBLIC-EXPORT-001
    name: Public-recipient invoice export preview must be deterministic and clearly scoped as transport-free handoff
    category: invoice_integrity
    source_id: DK-OFFENTLIGE-BETALINGER-2007-798
    severity: hard_stop
    machine_rule:
      require:
        - issued_invoice_snapshot_exists
        - public_recipient_marker_or_ean_present
        - export_preview_uses_stable_xml_content
        - export_scope_declares_no_peppol_transport
      forbid:
        - public_export_without_valid_ean_gln
        - transport_claim_without_access_point
    explanation: Rentemester may export a deterministic preview artifact for public-customer invoicing, but it must only do so from an immutable issued invoice snapshot, require valid EAN/GLN metadata, and avoid implying that PEPPOL transport has already happened.
  - rule_id: DK-INVOICE-PUBLIC-OIOUBL-001
    name: Public-recipient OIOUBL handoff export must be deterministic, auditable, and transport-scoped
    category: invoice_integrity
    source_id: DK-OFFENTLIGE-BETALINGER-2007-798
    severity: hard_stop
    machine_rule:
      require:
        - issued_invoice_snapshot_exists
        - public_recipient_marker_or_ean_present
        - buyer_ean_number_is_13_digits
        - due_date_present
        - seller_name_address_vat_present
        - buyer_name_address_present
        - invoice_lines_have_quantity_price_and_total
        - oioubl_export_uses_stable_xml_content
        - oioubl_export_records_audit_metadata
        - oioubl_export_scope_declares_no_direct_peppol_submission
      forbid:
        - public_export_without_valid_ean_gln
        - transport_claim_without_access_point
    explanation: Rentemester may materialize a deterministic OIOUBL handoff artifact for a public-customer invoice when the issued snapshot contains the required sender, buyer, line, amount, and due-date metadata, and when the export is recorded as an auditable handoff rather than direct PEPPOL submission.
  - rule_id: DK-INVOICE-DUE-DATE-001
    name: Customer invoices must expose a deterministic due date and overdue classification
    category: invoice_lifecycle
    source_id: DK-RENTELOVEN-2014-459
    provisions:
      - ref: "§ 3, stk. 1"
        text_hash: "sha256:1bc08bf70f7a73f1d25a70ec3393b6f176492d2d31f39910b84602b655582962"
      - ref: "§ 3, stk. 2"
        text_hash: "sha256:86e6c5b8e8aa4d909d067240a608c5b517f30c005e5991472e1051f70f07826f"
    severity: hard_stop
    machine_rule:
      require:
        - explicit_due_date_or_statutory_30_day_fallback
        - overdue_days_from_collectible_open_balance
      forbid:
        - overdue_flag_on_zero_or_negative_balance
    explanation: Rentemester must deterministically identify when an issued invoice is due or overdue, using an explicit due date when present and otherwise the statutory 30-day fallback after the payment demand.
  - rule_id: DK-INVOICE-LATE-INTEREST-001
    name: Overdue customer invoices must support deterministic statutory late-interest calculation
    category: invoice_lifecycle
    source_id: DK-RENTELOVEN-2014-459
    provisions:
      - ref: "§ 5, stk. 1"
        text_hash: "sha256:1afb43f039820251355a071d780d7c0263ff307daa1381903310bb72cfe71bba"
    severity: hard_stop
    machine_rule:
      require:
        - overdue_open_balance
        - reference_rate_input
        - annual_rate_equals_reference_rate_plus_8pct_points
        - daily_interest_from_overdue_days
      forbid:
        - late_interest_on_non_overdue_or_nonpositive_balance
    explanation: Rentemester must be able to calculate statutory delay interest on overdue collectible balances using the renteloven formula and an explicit reference rate for the relevant half-year.
  - rule_id: DK-INVOICE-LATE-INTEREST-REGISTER-001
    name: A late-interest claim may only be registered from a deterministic calculation and must remain traceable in the claim balance
    category: invoice_lifecycle
    source_id: DK-RENTELOVEN-2014-459
    provisions:
      - ref: "§ 5, stk. 1"
        text_hash: "sha256:1afb43f039820251355a071d780d7c0263ff307daa1381903310bb72cfe71bba"
    severity: hard_stop
    machine_rule:
      require:
        - eligible_late_interest_calculation_before_registration
        - immutable_interest_claim_record
        - unique_interest_claim_per_invoice_date_and_reference_rate
        - claim_balance_includes_registered_interest
      forbid:
        - interest_registration_without_positive_accrued_interest
    explanation: Rentemester must only register late interest from a deterministic statutory calculation, keep each registered interest claim immutable and traceable, and surface the accumulated registered interest in the invoice claim balance.
  - rule_id: DK-INVOICE-LATE-INTEREST-BOOKKEEPING-001
    name: Registered late-interest claims must be bookable once to receivables and non-VAT claim income
    category: invoice_accounting
    source_id: DK-BOGFORINGSLOVEN-2022-700
    provisions:
      - ref: "§ 9, stk. 1"
        text_hash: "sha256:75acd88eca28d81d86de2d14ed3c3871304f3e4da3cffc0920be43322a96153a"
    severity: hard_stop
    machine_rule:
      require:
        - registered_interest_claim_reference
        - receivable_debit_for_interest_amount
        - non_vat_claim_income_credit_for_interest_amount
        - append_only_interest_posting_link
      forbid:
        - second_bookkeeping_of_same_interest_claim
    explanation: Rentemester must be able to book each registered late-interest claim as its own append-only receivable and income entry exactly once, so statutory interest claims are traceable in the ledger without mutating the original invoice posting.
  - rule_id: DK-INVOICE-REMINDER-FEE-001
    name: Reminder fees must respect statutory max amount, max count, and spacing
    category: invoice_lifecycle
    source_id: DK-RENTELOVEN-2014-459
    provisions:
      - ref: "§ 9b, stk. 1"
        text_hash: "sha256:2a6309a80034886551544568990e364cf5e7797f16a28169b13cab12e1caeaa3"
      - ref: "§ 9b, stk. 2"
        text_hash: "sha256:e286daf0fe44881b41f3da26eb793c05aa8edd728628bcbb64d4857fa107e7c2"
    severity: hard_stop
    machine_rule:
      require:
        - overdue_open_balance_on_reminder_date
        - reminder_fee_not_above_100_dkk
        - no_more_than_3_reminder_fees_per_same_claim
        - at_least_10_days_between_reminder_letters
      forbid:
        - reminder_fee_on_non_overdue_or_fully_settled_invoice
        - fourth_or_later_reminder_fee_for_same_claim
        - reminder_fee_less_than_10_days_after_previous_reminder
    explanation: Rentemester must only register rykkergebyrer when the invoice is still overdue, each fee is at most DKK 100, there are at most three for the same claim, and reminder letters are spaced by at least 10 days.
  - rule_id: DK-INVOICE-REMINDER-FEE-BOOKKEEPING-001
    name: Registered reminder fees must be bookable once to receivables and non-VAT claim income
    category: invoice_accounting
    source_id: DK-BOGFORINGSLOVEN-2022-700
    provisions:
      - ref: "§ 9, stk. 1"
        text_hash: "sha256:75acd88eca28d81d86de2d14ed3c3871304f3e4da3cffc0920be43322a96153a"
    severity: hard_stop
    machine_rule:
      require:
        - registered_reminder_fee_reference
        - receivable_debit_for_reminder_fee_amount
        - non_vat_claim_income_credit_for_reminder_fee_amount
        - append_only_reminder_posting_link
      forbid:
        - second_bookkeeping_of_same_reminder_fee
    explanation: Rentemester must be able to book each registered reminder fee as its own append-only receivable and income entry exactly once, so reminder claims are traceable in the ledger without mutating the original invoice posting.
  - rule_id: DK-INVOICE-LATE-COMPENSATION-001
    name: Overdue commercial invoices must support deterministic assessment of the fixed compensation claim
    category: invoice_lifecycle
    source_id: DK-UDENRETLIGE-INDDRIVELSESOMKOSTNINGER-AMEND-2013-105
    severity: hard_stop
    machine_rule:
      require:
        - overdue_open_balance
        - commercial_transaction_indicator
        - fixed_compensation_amount_310_dkk_from_2013_03_01
      forbid:
        - compensation_claim_on_non_overdue_or_noncommercial_invoice
    explanation: Rentemester must be able to determine whether an overdue invoice qualifies for the fixed DKK 310 compensation claim introduced by the 2013 amendment on without-court collection costs.
  - rule_id: DK-INVOICE-LATE-COMPENSATION-REGISTER-001
    name: A fixed compensation claim may only be registered once per overdue commercial invoice and must stay traceable in the claim balance
    category: invoice_lifecycle
    source_id: DK-UDENRETLIGE-INDDRIVELSESOMKOSTNINGER-AMEND-2013-105
    severity: hard_stop
    machine_rule:
      require:
        - eligible_compensation_assessment_before_registration
        - immutable_compensation_claim_record
        - single_registered_compensation_claim_per_invoice
        - claim_balance_includes_registered_compensation
      forbid:
        - second_compensation_claim_for_same_invoice
        - compensation_registration_when_invoice_is_not_eligible
    explanation: Rentemester must only register the fixed compensation claim after a deterministic eligibility check, keep one immutable claim record per invoice, and surface the registered amount in the invoice claim balance.
  - rule_id: DK-INVOICE-LATE-COMPENSATION-BOOKKEEPING-001
    name: Registered fixed compensation claims must be bookable once to receivables and non-VAT claim income
    category: invoice_accounting
    source_id: DK-BOGFORINGSLOVEN-2022-700
    provisions:
      - ref: "§ 9, stk. 1"
        text_hash: "sha256:75acd88eca28d81d86de2d14ed3c3871304f3e4da3cffc0920be43322a96153a"
    severity: hard_stop
    machine_rule:
      require:
        - registered_compensation_claim_reference
        - receivable_debit_for_compensation_amount
        - non_vat_claim_income_credit_for_compensation_amount
        - append_only_compensation_posting_link
      forbid:
        - second_bookkeeping_of_same_compensation_claim
    explanation: Rentemester must be able to book a registered fixed compensation claim as a separate append-only receivable and income entry exactly once, so the legal claim is reflected in the ledger without mutating the original invoice posting.
  - rule_id: DK-INVOICE-BOOKKEEPING-001
    name: Issued sales invoices must create one traceable receivable, revenue, and VAT journal entry
    category: invoice_accounting
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    provisions:
      - ref: "§ 58, stk. 1, nr. 7"
        text_hash: "sha256:fbf5c12a82de96cc008148a8bf4b77c284e520ab3b983d3e93e8701f16398cf9"
      - ref: "§ 58, stk. 1, nr. 9"
        text_hash: "sha256:090223e9a56ea922e65eb53deb4ebd9a9bc20db57199ce2af4ffa83253da4670"
    severity: hard_stop
    machine_rule:
      require:
        - issued_invoice_reference
        - receivable_line_for_gross_amount
        - revenue_line_for_net_amount
        - output_vat_line_for_vat_amount
      forbid:
        - second_sales_posting_for_same_invoice
    explanation: Rentemester must be able to deterministically book an issued invoice into the ledger so open receivables, revenue, and output VAT are traceable to the invoice; non-DKK invoices must book on DKK ledger amounts while preserving foreign amount and FX basis on the journal entry.
  - rule_id: DK-INVOICE-BOOKKEEPING-REVERSE-002
    name: Reverse-charge sales invoices and fallback credit notes must post without an output-VAT line
    category: invoice_accounting
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    provisions:
      - ref: "§ 59, stk. 1"
        text_hash: "sha256:2f8fec79698582aa822d0a91c30b12b0932e42bc04e4a120ec55a5511a0aa1b3"
      - ref: "§ 60, stk. 1"
        text_hash: "sha256:b00d554746fb7d423668afeada440ae77edc48fe3eb107472d66aff9cc604945"
    severity: hard_stop
    machine_rule:
      require:
        - reverse_charge_sales_base_classification
        - receivable_and_revenue_only_for_reverse_charge_sales
      forbid:
        - output_vat_line_on_reverse_charge_sales_posting
        - zero_amount_output_vat_line_on_reverse_charge_credit_note_fallback
    explanation: Rentemester must post reverse-charge sales documents without a Danish output-VAT line while still classifying the sales base, so lawful reverse-charge invoices and fallback credit notes remain bookable and auditable.
  - rule_id: DK-INVOICE-SETTLEMENT-001
    name: Bank-settled customer payments must clear receivables with traceable invoice and bank links
    category: invoice_lifecycle
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    severity: hard_stop
    machine_rule:
      require:
        - issued_invoice_reference
        - bank_transaction_reference
        - receivable_credit_for_paid_amount
        - bank_debit_for_paid_amount
        - immutable_payment_application
      forbid:
        - settlement_without_open_invoice_balance
    explanation: Rentemester must deterministically settle customer receipts against issued invoices so the receivable is cleared and the bank receipt is traceable in both ledger and invoice lifecycle; for non-DKK invoices the receipt currency must match the invoice currency and carry deterministic DKK conversion metadata.
  - rule_id: DK-INVOICE-CLAIM-SETTLEMENT-001
    name: Bank-settled invoice claim receipts must clear booked claim receivables with traceable invoice and bank links
    category: invoice_lifecycle
    source_id: DK-BOGFORINGSLOVEN-2022-700
    severity: hard_stop
    machine_rule:
      require:
        - issued_invoice_reference
        - bank_transaction_reference
        - settled_principal_before_claim_receipt
        - positive_claim_open_balance
        - receivable_credit_for_claim_amount
        - bank_debit_for_claim_amount
        - immutable_claim_payment_application
      forbid:
        - claim_settlement_without_outstanding_claim_balance
        - claim_settlement_before_principal_is_cleared
    explanation: Rentemester must deterministically settle incoming bank receipts for already-booked reminder, compensation, or interest claims only after the principal invoice receivable is cleared, so remaining claim balances stay traceable in both lifecycle data and ledger.
  - rule_id: DK-INVOICE-COMBINED-SETTLEMENT-001
    name: A single incoming bank receipt may settle principal and booked claims in one deterministic application
    category: invoice_lifecycle
    source_id: DK-BOGFORINGSLOVEN-2022-700
    severity: hard_stop
    machine_rule:
      require:
        - issued_invoice_reference
        - bank_transaction_reference
        - principal_component_applied_first
        - residual_component_limited_to_booked_claim_balance
        - immutable_split_payment_application
        - single_balanced_bank_receipt_journal
      forbid:
        - combined_receipt_exceeding_total_open_receivable
        - claim_component_without_booked_claim_balance
    explanation: Rentemester must handle a single incoming customer payment that covers both the outstanding invoice principal and already-booked reminder, compensation, or interest claims by splitting the application deterministically while preserving one traceable bank receipt journal.
  - rule_id: DK-INVOICE-PAYMENT-001
    name: Invoice payments must be traceably applied against issued invoices and bank transactions
    category: invoice_lifecycle
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    severity: hard_stop
    machine_rule:
      require:
        - issued_invoice_reference
        - payment_date
        - paid_amount
        - immutable_payment_application
      forbid:
        - payment_application_above_open_balance
    explanation: Rentemester must track which issued invoice a payment settles, how much was applied, and whether any balance remains open.
  - rule_id: DK-INVOICE-CORRECTION-BALANCE-001
    name: Open invoice balance must reflect linked credit notes as well as payments
    category: invoice_lifecycle
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    severity: hard_stop
    machine_rule:
      require:
        - original_invoice_reference
        - credited_amount_in_balance_calculation
        - payment_application_against_net_open_balance
      forbid:
        - payment_application_above_corrected_open_balance
    explanation: Once an invoice is corrected with a linked credit note, Rentemester must reduce the remaining receivable before accepting further customer payments.
  - rule_id: DK-CREDIT-NOTE-001
    name: Credit notes must reference the original issued invoice and mirror the corrected VAT effect
    category: invoice_correction
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    provisions:
      - ref: "§ 58, stk. 2"
        text_hash: "sha256:7491f9df0204116cdee57939d3765170ba8de20a2188e6cc807fded3d7f64227"
      - ref: "§ 66, stk. 1, nr. 6"
        text_hash: "sha256:5708034ac432b9bee2826945ba679fca8327f0e328a999268d84e9f256d96248"
    severity: hard_stop
    machine_rule:
      require:
        - original_invoice_reference
        - credit_note_number
        - immutable_credit_note_snapshot
        - negative_revenue_and_vat_effect
        - cumulative_credit_amount_lte_original_invoice
      forbid:
        - credit_note_without_original_invoice
        - cumulative_credit_amount_above_original_invoice
    explanation: Rentemester must issue credit notes as separate immutable correction documents tied to the original invoice, including partial credits, without ever crediting more than the original invoice amount.
  - rule_id: DK-INVOICE-REFUND-001
    name: Customer refunds after credit notes must be traceably settled against the bank and corrected invoice balance
    category: invoice_lifecycle
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    severity: hard_stop
    machine_rule:
      require:
        - original_invoice_reference
        - outgoing_bank_transaction_reference
        - refund_amount_within_credit_balance
        - receivable_debit_for_refund
        - bank_credit_for_refund
        - immutable_refund_application
      forbid:
        - refund_without_credit_balance
    explanation: When an issued invoice has been over-settled because of a linked credit note, Rentemester must settle the customer refund as a separate traceable bank-linked correction.
  - rule_id: DK-INVOICE-BAD-DEBT-WRITEOFF-001
    name: Uncollectible customer invoice receivables must be written off through an append-only, invoice-linked correction entry
    category: invoice_lifecycle
    source_id: DK-BOGFORINGSLOVEN-2022-700
    provisions:
      - ref: "§ 9, stk. 1"
        text_hash: "sha256:75acd88eca28d81d86de2d14ed3c3871304f3e4da3cffc0920be43322a96153a"
      - ref: "§ 9, stk. 3"
        text_hash: "sha256:87459b2827cedd7f32dba1aaa78bb13b8afa8f2b6edd152a8ec8ba688461b8f2"
    severity: hard_stop
    machine_rule:
      require:
        - issued_invoice_reference
        - positive_open_principal_balance
        - append_only_bad_debt_record
        - receivable_credit_for_written_off_gross_amount
      forbid:
        - bad_debt_writeoff_without_open_principal_balance
        - bad_debt_writeoff_above_open_principal_balance
    explanation: When a customer invoice loss is established, Rentemester must write off only the remaining principal receivable through an append-only invoice-linked correction entry so the audit trail remains deterministic; non-DKK write-offs must reuse the invoice’s fixed FX basis for the DKK ledger relief.
  - rule_id: DK-INVOICE-LOCK-001
    name: Issued invoices cannot be modified
    category: invoice_integrity
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    provisions:
      - ref: "§ 58, stk. 2"
        text_hash: "sha256:7491f9df0204116cdee57939d3765170ba8de20a2188e6cc807fded3d7f64227"
    severity: hard_stop
    machine_rule:
      forbid: [modify_issued_invoice, delete_issued_invoice]
      require: credit_note_for_correction
    explanation: Corrections to issued invoices are handled via credit note and new invoice, not mutation.
  - rule_id: DK-INVOICE-PREVIEW-001
    name: Invoice preview must render the issued-invoice PDF without mutating the ledger
    category: invoice_integrity
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    provisions:
      - ref: "§ 58, stk. 1, nr. 2"
        text_hash: "sha256:9908ba73ceb7a4bae7d4b0b205d2bc1d4f96ee8618ecc0487ea8822872e9c0a6"
    severity: soft_warn
    machine_rule:
      require:
        - same_validator_as_issue
        - same_renderer_as_issue
        - draft_invoice_number_placeholder
      forbid:
        - sequence_draw_during_preview
        - documents_row_during_preview
        - audit_log_entry_during_preview
    explanation: Rentemester's "Forhåndsvis"-flow (#440) must run the same validator + renderer as the irreversible issue path so the owner sees the exact PDF the customer will receive, but without drawing a fortløbende invoice number, without writing a documents row, and without appending to audit_log — a closed preview must leave the ledger and sequence-serie untouched.
  # ===== RECURRING INVOICES (#118) =====
  - rule_id: DK-RECURRING-INVOICE-TEMPLATE-001
    name: Recurring invoice templates store an immutable, pre-validated invoice specification
    category: invoice_lifecycle
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    provisions:
      - ref: "§ 58, stk. 1"
        text_hash: "sha256:04629844bae235a49e49aaa95f21e625e1a8bbca1c51bccc0604cc20a3bdb97a"
    severity: hard_stop
    machine_rule:
      require:
        - append_only_recurring_template
        - prevalidated_embedded_invoice_payload
      forbid:
        - mutate_recurring_template_identity_or_payload
    explanation: A recurring invoice template captures the repeating invoice (interval, customer, lines, VAT, delivery-period mode) as an append-only, pre-validated specification so every generated invoice is reproducible; the embedded payload must already satisfy the full-invoice rules before the template can be created.
  - rule_id: DK-RECURRING-INVOICE-GENERATE-001
    name: Recurring invoice generation is explicit, deterministic and idempotent per template period
    category: invoice_lifecycle
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    severity: hard_stop
    machine_rule:
      require:
        - deterministic_period_index_from_first_issue_date
        - append_only_generation_audit_link
      forbid:
        - duplicate_generation_for_same_template_period
        - background_recurring_invoice_scheduling
    explanation: Rentemester materialises a recurring invoice only on an explicit generate call for a given as-of date; the issue date and delivery period are derived deterministically from the template's first issue date and interval, and a unique template/period audit link prevents duplicate generation across reruns.
