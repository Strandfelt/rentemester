version: dk-documents-v0.0.2
sources:
  - DK-BOGFORINGSLOVEN-2022-700
  - DK-BILAG-OPBEVARING-2023-1383
  - DK-BILAG-OPBEVARING-AMEND-2025-302
rules:
  - rule_id: DK-DOCUMENT-STORAGE-001
    name: Purchase and sale supporting documents stored digitally must include the statutory minimum fields
    category: document_validation
    source_id: DK-BILAG-OPBEVARING-2023-1383
    severity: hard_stop
    machine_rule:
      require:
        - issue_date
        - delivery_description
        - amount_inc_vat
        - sender_name_address_vat_or_cvr
        - recipient_name_address_vat_or_cvr
        - vat_amount
        - payment_details
      unless:
        - document_type == 'cash_register_receipt'
        - exemption_code == 'FOREIGN_PHYSICAL_ONLY'
    explanation: Rentemester must reject digitally stored purchase/sale supporting documents that lack the statutory minimum metadata unless an explicit legal exception applies.
  - rule_id: DK-DOCUMENT-CASH-RECEIPT-001
    name: Cash-register receipts may be stored without the full Danish minimum metadata set, but the original file and currency trail must be preserved
    category: document_validation
    source_id: DK-BILAG-OPBEVARING-2023-1383
    severity: hard_stop
    machine_rule:
      condition: document_type == 'cash_register_receipt'
      require:
        - original_document_file
        - original_currency_code_when_non_dkk
      forbid:
        - rejecting_cash_register_receipt_only_because_full_minimum_fields_are_missing
    explanation: Kassestrimler from a sales registration system are exempt from the standard metadata minimum, but Rentemester must still preserve the original document and any original foreign currency on the receipt.
  - rule_id: DK-DOCUMENT-FOREIGN-PHYSICAL-001
    name: Foreign physical-only supporting documents may be stored without the Danish minimum metadata set, but the original currency trail must be preserved
    category: document_validation
    source_id: DK-BILAG-OPBEVARING-2023-1383
    severity: hard_stop
    machine_rule:
      condition: exemption_code == 'FOREIGN_PHYSICAL_ONLY'
      require:
        - original_document_file
        - original_currency_code_when_non_dkk
      forbid:
        - rejecting_foreign_physical_document_only_because_danish_minimum_fields_are_missing
    explanation: When a purchase or sale document only exists in physical form and was received outside Denmark, Rentemester must still preserve the original file and currency trail even though the standard Danish metadata minimum does not apply.
  - rule_id: DK-DOCUMENT-INTEGRITY-001
    name: Original supporting documents must be preserved without silent overwrite or mutation
    category: document_integrity
    source_id: DK-BOGFORINGSLOVEN-2022-700
    severity: hard_stop
    machine_rule:
      require:
        - sha256_content_addressed_storage
        - duplicate_hash_rejected
        - append_only_audit_log
    explanation: Stored supporting documents must be kept on a secure, traceable basis so the original content is preserved and duplicates are not silently mutated or overwritten.
  - rule_id: DK-MASTER-DATA-VENDOR-001
    name: Vendor master data reused on supporting documents must resolve deterministically before ingest
    category: document_integrity
    source_id: DK-BILAG-OPBEVARING-2023-1383
    severity: hard_stop
    machine_rule:
      require:
        - vendor_id_resolves_to_append_only_vendor_record_when_used
        - resolved_vendor_sender_fields_materialized_into_stored_document_metadata
      forbid:
        - ingest_with_missing_vendor_lookup
    explanation: Rentemester may reuse stored vendor master data, but the sender fields used for an ingested supporting document must resolve deterministically and be persisted into the stored document metadata at ingest time.
