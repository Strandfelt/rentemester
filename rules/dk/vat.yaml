version: dk-vat-v0.0.3
sources:
  - DK-MOMSLOVEN-2024-209
  - DK-MOMSBEKENDTGORELSEN-2023-1435
vat_codes:
  - code: DK_PURCHASE_25
    type: purchase
    rate: 0.25
    reverse_charge: false
    deductible_percentage: 1.0
  - code: DK_SALE_25
    type: sale
    rate: 0.25
    reverse_charge: false
    deductible_percentage: 1.0
  - code: EU_SERVICE_REVERSE_CHARGE
    type: purchase
    rate: 0.25
    reverse_charge: true
    deductible_percentage: 1.0
  - code: REPRESENTATION_SPECIAL
    type: purchase
    rate: 0.25
    reverse_charge: false
    deductible_percentage: 0.25
  - code: DK_BAD_DEBT_25
    type: sale_adjustment
    rate: 0.25
    reverse_charge: false
    deductible_percentage: 1.0
  - code: DK_SALE_EXEMPT
    type: sale
    rate: 0.0
    reverse_charge: false
    deductible_percentage: 1.0
  - code: OSS_EU_CONSUMER
    type: sale
    rate: 0.0
    reverse_charge: false
    deductible_percentage: 1.0
rules:
  - rule_id: DK-VAT-SEPARATE-AMOUNT-001
    name: Danish VAT deduction requires stated VAT amount
    category: vat_validation
    source_id: DK-MOMSBEKENDTGORELSEN-2023-1435
    provisions:
      - ref: "§ 58, stk. 1, nr. 8"
        text_hash: "sha256:b3b34287303c4a5f0277a3f0eeb7f5463387c95a96b0d70bed93574c99fe3992"
      - ref: "§ 58, stk. 1, nr. 9"
        text_hash: "sha256:090223e9a56ea922e65eb53deb4ebd9a9bc20db57199ce2af4ffa83253da4670"
    severity: hard_stop
    machine_rule:
      condition: invoice.country == 'DK' && vat_claimed == true
      require: [vat_rate, vat_amount]
    explanation: If Danish purchase VAT is claimed, invoice evidence must state VAT amount/rate separately.
  - rule_id: DK-VAT-REPORT-001
    name: VAT settlement basis must show output VAT, input VAT, and net payable for a period
    category: vat_reporting
    source_id: DK-MOMSLOVEN-2024-209
    provisions:
      - ref: "§ 56, stk. 1"
        text_hash: "sha256:de852753858a9d11b23cb253c522c6180110b99a30c2da0c59a9aee3acb289bc"
      - ref: "§ 56, stk. 2"
        text_hash: "sha256:3c599b384a7301502e03090460dc510362150297267417a2368f7c3c002a79ea"
      - ref: "§ 56, stk. 3"
        text_hash: "sha256:d2c7ac1ff0954a0529dac1baf3c8a1e080adeaa8362bf950d19d44650fb32177"
    severity: hard_stop
    machine_rule:
      require:
        - period_start
        - period_end
        - output_vat_total
        - input_vat_total
        - net_vat_payable
        - traceable_journal_entries_in_period
    explanation: Rentemester must deterministically derive the VAT settlement basis for a period from traceable journal data so the business can reconcile and file VAT correctly.
  - rule_id: DK-VAT-REVERSE-CHARGE-001
    name: EU service reverse-charge purchases must book both output and deductible input VAT in the period
    category: vat_posting
    source_id: DK-MOMSLOVEN-2024-209
    provisions:
      - ref: "§ 46, stk. 1, nr. 3"
        text_hash: "sha256:6b3c682575a7903360cc80d40e778a9839870f439a5b10f14c52e117d4086428"
    severity: hard_stop
    machine_rule:
      condition: vat_code == 'EU_SERVICE_REVERSE_CHARGE'
      require:
        - output_vat_line_on_1200
        - input_vat_line_on_4000
        - identical_vat_amounts_when_fully_deductible
        - reverse_charge_purchase_base
    explanation: Rentemester must deterministically book reverse-charge VAT on EU service purchases so VAT reporting includes both the payment liability and the deductible input tax when applicable.
  - rule_id: DK-VAT-REPRESENTATION-001
    name: Representation purchases with limited VAT deduction must only book 25 percent of the VAT as deductible input tax
    category: vat_posting
    source_id: DK-MOMSLOVEN-2024-209
    provisions:
      - ref: "§ 42, stk. 1, nr. 5"
        text_hash: "sha256:60c9ae5260f7ebd4fbe5f4005a0c18a6df0af6a55b683fad9c570e0b636270a7"
      - ref: "§ 42, stk. 2"
        text_hash: "sha256:a5decab3fb12767522d79d3c0e633f99994cebbfd435c6b665a87234936ef42f"
    severity: hard_stop
    machine_rule:
      condition: vat_code == 'REPRESENTATION_SPECIAL'
      require:
        - representation_purchase_base
        - deductible_input_vat_equals_25pct_of_full_vat
        - non_deductible_vat_expensed
      forbid:
        - full_input_vat_deduction_for_representation_purchase
    explanation: Rentemester must deterministically split representation purchases so only 25 percent of the full VAT is booked as deductible input VAT, while the remaining VAT is kept in the expense basis.
  - rule_id: DK-VAT-BAD-DEBT-001
    name: Established bad-debt losses on standard-rated sales must reduce output VAT from the deductible 80 percent loss basis
    category: vat_posting
    source_id: DK-MOMSLOVEN-2024-209
    provisions:
      - ref: "§ 27, stk. 6"
        text_hash: "sha256:c51013c24f5e03ec69d42690dceca81830213cc3535b824ba2472e482920275d"
    severity: hard_stop
    machine_rule:
      condition: vat_code == 'DK_BAD_DEBT_25'
      require:
        - established_uncollectible_invoice_loss
        - bad_debt_relief_base_equals_80pct_of_gross_loss
        - output_vat_reduction_matches_standard_rate
        - receivable_credit_for_written_off_gross_amount
      forbid:
        - bad_debt_vat_relief_on_non_vat_or_nonstandard_invoice
        - bad_debt_writeoff_above_open_principal_balance
    explanation: When an issued Danish standard-rated invoice becomes an established bad debt, Rentemester must write off the gross receivable, expense the deductible loss basis, and reduce output VAT deterministically for the same loss amount.
  - rule_id: DK-VAT-FILING-001
    name: A filing-ready momsangivelse may only be produced for a closed VAT period and must map data into the standard SKAT rubrikker
    category: vat_reporting
    source_id: DK-MOMSLOVEN-2024-209
    provisions:
      - ref: "§ 57, stk. 1"
        text_hash: "sha256:e9c2dbb9df675096488284156478d073e33b33f70d1fde9c3a0ca3e52fc7cddb"
    severity: hard_stop
    machine_rule:
      condition: vat_period_status in ['closed', 'reported']
      require:
        - salgsmoms
        - moms_af_varekob_udland
        - moms_af_ydelseskob_udland
        - kobsmoms
        - momstilsvar_equals_salgsmoms_plus_udenlandsk_moms_minus_kobsmoms
        - rubrik_a
        - rubrik_b
        - rubrik_c
      forbid:
        - momsangivelse_for_open_or_incomplete_vat_period
    explanation: A momsangivelse must only be produced for a closed or reported vat_quarter period and must deterministically map the VAT settlement data into the standard SKAT rubrikker so the business can file via TastSelv with traceable numbers.
  - rule_id: DK-VAT-EU-SALES-LIST-001
    name: Cross-border B2B sales without Danish VAT must be listed per customer VAT number for the EU sales list
    category: vat_reporting
    source_id: DK-MOMSLOVEN-2024-209
    provisions:
      - ref: "§ 54, stk. 1"
        text_hash: "sha256:38b51c5c3a1c17e1333f1f0563101382f65a0b77999852a1f948640278a2c385"
    severity: hard_stop
    machine_rule:
      require:
        - period_start
        - period_end
        - customer_vat_number_per_line
        - total_value_per_customer
      forbid:
        - domestic_or_standard_vat_sale_on_the_eu_sales_list
    explanation: Rentemester must deterministically derive the EU sales list (EU-salg uden moms) by grouping cross-border B2B sales without Danish VAT per customer VAT number, so the business can file the separate recapitulative statement alongside the momsangivelse.
  - rule_id: DK-VAT-OSS-001
    name: Digital-service sales to EU consumers under the OSS scheme must be kept out of the standard momsangivelse
    category: vat_reporting
    severity: hard_stop
    machine_rule:
      condition: vat_code == 'OSS_EU_CONSUMER'
      require:
        - oss_consumer_sales_base_tracked_separately
      forbid:
        - danish_output_vat_on_oss_consumer_sale
        - oss_consumer_sale_in_standard_momsangivelse_rubrik
    explanation: >-
      OSS first slice. Selling digital services to private consumers in other EU
      member states is settled via a separate OSS return, not the Danish
      momsangivelse. Rentemester must recognise revenue booked with the
      OSS_EU_CONSUMER VAT code as OSS sales, track their base separately and keep
      them out of every standard momsangivelse rubrik. This rule is a deliberately
      narrow slice: it does not split the base per destination member state or
      rate, and Rentemester does not transmit an OSS return to SKAT — that
      remains the business's responsibility. The rule is uncited because the OSS
      provisions of momsloven fall outside the project's declared legal scope.