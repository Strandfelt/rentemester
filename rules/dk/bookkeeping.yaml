version: dk-bookkeeping-v0.0.3
sources:
  - DK-BOGFORINGSLOVEN-2022-700
  - DK-DIGITAL-BOGFORING-NONREGISTERED-2024-205
  - DK-DIGITAL-STANDARD-BOGFORING-2023-97
rules:
  - rule_id: DK-BOOKKEEPING-BALANCED-001
    name: Double-entry postings must balance
    category: ledger_validation
    source_id: DK-BOGFORINGSLOVEN-2022-700
    severity: hard_stop
    machine_rule:
      require: debit_sum_equals_credit_sum
    explanation: Ledger postings must be balanced. Rentemester rejects unbalanced journal entries before they can be posted.
  - rule_id: DK-BOOKKEEPING-APPEND-ONLY-001
    name: Posted journal entries are append-only
    category: ledger_integrity
    source_id: DK-BOGFORINGSLOVEN-2022-700
    severity: hard_stop
    machine_rule:
      forbid: [update_posted_entry, delete_posted_entry]
      require: reversal_entry_for_corrections
    explanation: Once posted, entries are locked. Corrections must be new reversing/correcting entries with audit trail.
  - rule_id: DK-BOOKKEEPING-REVERSAL-001
    name: Corrections must create a single traceable reversal entry
    category: ledger_integrity
    source_id: DK-BOGFORINGSLOVEN-2022-700
    severity: hard_stop
    machine_rule:
      require:
        - reversal_of_original_entry_id
        - mirrored_lines_with_swapped_debit_credit
        - immutable_reference_to_original_text
      forbid:
        - second_reversal_for_same_original
    explanation: Rentemester must correct a posted entry by appending one linked reversal entry that mirrors the original lines with opposite signs and leaves the original intact.
  - rule_id: DK-BOOKKEEPING-DOCUMENT-001
    name: Bookkeeping entries require evidence where relevant
    category: document_evidence
    source_id: DK-BOGFORINGSLOVEN-2022-700
    severity: hard_stop
    machine_rule:
      require: document_link_for_expense_or_sale
    explanation: Transactions must be linked to appropriate documentation unless explicitly exempted.
  - rule_id: DK-BOOKKEEPING-BANK-IMPORT-001
    name: Imported bank transactions must preserve transaction date, amount, text, and traceable source batch
    category: transaction_registration
    source_id: DK-BOGFORINGSLOVEN-2022-700
    severity: hard_stop
    machine_rule:
      require:
        - transaction_date
        - amount
        - text
        - import_batch_id
        - source_file_hash
        - deterministic_transaction_fingerprint
      forbid:
        - duplicate_transaction_fingerprint_in_same_company
    explanation: Rentemester must import bank transactions with enough metadata to support prompt registration, control trail, and deterministic deduplication.
  - rule_id: DK-BOOKKEEPING-RECONCILIATION-001
    name: Bank reconciliation must show matched and unmatched imported transactions for a period
    category: reconciliation
    source_id: DK-BOGFORINGSLOVEN-2022-700
    severity: hard_stop
    machine_rule:
      require:
        - period_start
        - period_end
        - matched_bank_transactions
        - unmatched_bank_transactions
        - traceable_links_to_journal_entries
    explanation: Rentemester must be able to deterministically reconcile imported bank transactions against posted journal entries so reporting has an updated control basis.
  - rule_id: DK-BOOKKEEPING-FX-001
    name: Non-DKK transaction imports must record the transaction-day exchange factor and DKK amount
    category: transaction_registration
    source_id: DK-DIGITAL-BOGFORING-NONREGISTERED-2024-205
    severity: hard_stop
    machine_rule:
      require:
        - foreign_currency_code
        - transaction_day_exchange_rate_or_conversion_factor
        - dkk_converted_amount
      forbid:
        - non_dkk_registration_without_conversion_basis
    explanation: When a transaction is registered in another currency than DKK, Rentemester must persist the currency, the conversion factor used on the transaction day, and the DKK amount used in the bookkeeping trail.
  - rule_id: DK-BOOKKEEPING-BACKUP-001
    name: The system must support weekly full backups of booked transactions and supporting documents
    category: backup_compliance
    source_id: DK-DIGITAL-BOGFORING-NONREGISTERED-2024-205
    severity: hard_stop
    machine_rule:
      require:
        - full_backup_of_ledger_snapshot
        - full_backup_of_supporting_documents
        - backup_manifest_with_timestamp_and_hashes
        - compliance_status_for_latest_backup_age
      forbid:
        - silently_missing_backup_after_more_than_7_days_with_new_activity
    explanation: Rentemester must be able to create a full backup of bookkeeping data and supporting documents and deterministically report when the weekly backup duty has become due because new activity happened after the last backup.
  - rule_id: DK-BOOKKEEPING-AUTHORITY-EXPORT-001
    name: Bookkeeping data and vouchers must be exportable by period in a structured machine-readable package
    category: authority_access
    source_id: DK-DIGITAL-STANDARD-BOGFORING-2023-97
    severity: hard_stop
    machine_rule:
      require:
        - period_bounded_export_request
        - machine_readable_journal_export
        - readable_document_copies
        - export_manifest_with_request_timestamp_and_deadline
      forbid:
        - authority_export_without_period_filter
    explanation: Rentemester must be able to assemble bookkeeping transactions and related vouchers for a requested period in a structured machine-readable format, alongside readable document files and a traceable deadline for a four-week authority handover flow.
  - rule_id: DK-BOOKKEEPING-RESTORE-001
    name: Backup material must be restorable into a readable company dataset
    category: restore_compliance
    source_id: DK-DIGITAL-STANDARD-BOGFORING-2023-97
    severity: hard_stop
    machine_rule:
      require:
        - backup_manifest_verification_before_restore
        - restored_ledger_snapshot
        - restored_supporting_documents
        - restored_config_and_invoice_files
      forbid:
        - restore_from_hash_mismatched_backup_material
    explanation: Rentemester must be able to restore backed-up bookkeeping material into a readable company dataset, validating the manifest and file hashes first so the regnskabsmateriale can actually be reconstructed.
  - rule_id: DK-BOOKKEEPING-PERIOD-LOCK-001
    name: Journal postings must stay out of closed periods and must not be future-dated
    category: period_control
    source_id: DK-DIGITAL-BOGFORING-NONREGISTERED-2024-205
    severity: hard_stop
    machine_rule:
      require:
        - transaction_date_not_in_closed_or_reported_period
        - transaction_date_not_after_current_business_date
      forbid:
        - mutation_inside_closed_period
        - future_dated_journal_posting
    explanation: Rentemester must block postings whose transaction date falls inside a closed or reported accounting period, and must also reject future-dated journal entries so historical VAT and bookkeeping periods stay stable.
  - rule_id: DK-BOOKKEEPING-RETENTION-001
    name: Supporting material must carry a retention deadline from the end of the fiscal year plus five years
    category: retention_control
    source_id: DK-BOGFORINGSLOVEN-2022-700
    severity: hard_stop
    machine_rule:
      require:
        - retain_until_on_documents
        - retain_until_on_journal_entries
        - retain_until_on_bank_transactions
        - retention_status_report_by_as_of_date
      forbid:
        - silent_missing_retention_deadline
    explanation: Rentemester must track a deterministic retention deadline for bookkeeping material based on the end of the fiscal year the material relates to, and surface overdue material without deleting it automatically.
