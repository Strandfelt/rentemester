version: dk-bookkeeping-v0.0.7
sources:
  - DK-BOGFORINGSLOVEN-2022-700
  - DK-DIGITAL-BOGFORING-NONREGISTERED-2024-205
  - DK-DIGITAL-STANDARD-BOGFORING-2023-97
rules:
  - rule_id: DK-BOOKKEEPING-BALANCED-001
    name: Double-entry postings must balance
    category: ledger_validation
    source_id: DK-BOGFORINGSLOVEN-2022-700
    provisions:
      - ref: "§ 7, stk. 1"
        text_hash: "sha256:1094e0af03f6b6383aee9c5bbc46f629ab94d04b2f949d01621ad54195f1b744"
    severity: hard_stop
    machine_rule:
      require: debit_sum_equals_credit_sum
    explanation: Ledger postings must be balanced. Rentemester rejects unbalanced journal entries before they can be posted.
  - rule_id: DK-BOOKKEEPING-APPEND-ONLY-001
    name: Posted journal entries are append-only
    category: ledger_integrity
    source_id: DK-BOGFORINGSLOVEN-2022-700
    provisions:
      - ref: "§ 9, stk. 3"
        text_hash: "sha256:87459b2827cedd7f32dba1aaa78bb13b8afa8f2b6edd152a8ec8ba688461b8f2"
      - ref: "§ 13, stk. 1"
        text_hash: "sha256:c2d76476456d6ad519249c8b77061dc2db1d9c0995d4bf47be64066b22893ed0"
    severity: hard_stop
    machine_rule:
      forbid: [update_posted_entry, delete_posted_entry]
      require: reversal_entry_for_corrections
    explanation: Once posted, entries are locked. Corrections must be new reversing/correcting entries with audit trail.
  - rule_id: DK-BOOKKEEPING-REVERSAL-001
    name: Corrections must create a single traceable reversal entry
    category: ledger_integrity
    source_id: DK-BOGFORINGSLOVEN-2022-700
    provisions:
      - ref: "§ 9, stk. 3"
        text_hash: "sha256:87459b2827cedd7f32dba1aaa78bb13b8afa8f2b6edd152a8ec8ba688461b8f2"
    severity: hard_stop
    machine_rule:
      require:
        - reversal_of_original_entry_id
        - mirrored_lines_with_swapped_debit_credit
        - immutable_reference_to_original_text
      forbid:
        - second_reversal_for_same_original
    explanation: Rentemester must correct a posted entry by appending one linked reversal entry that mirrors the original lines with opposite signs and leaves the original intact.
  - rule_id: DK-BOOKKEEPING-DOCUMENT-001
    name: Bookkeeping entries require evidence where relevant
    category: document_evidence
    source_id: DK-BOGFORINGSLOVEN-2022-700
    provisions:
      - ref: "§ 9, stk. 1"
        text_hash: "sha256:75acd88eca28d81d86de2d14ed3c3871304f3e4da3cffc0920be43322a96153a"
      - ref: "§ 9, stk. 2"
        text_hash: "sha256:74176e8a44dc7c34034445ee127cbace3ee8a739c979ab4473b0696e62e17c24"
    severity: hard_stop
    machine_rule:
      require: document_link_for_expense_or_sale
    explanation: Transactions must be linked to appropriate documentation unless explicitly exempted.
  - rule_id: DK-BOOKKEEPING-BANK-IMPORT-001
    name: Imported bank transactions must preserve transaction date, amount, text, and traceable source batch
    category: transaction_registration
    source_id: DK-BOGFORINGSLOVEN-2022-700
    provisions:
      - ref: "§ 7, stk. 1"
        text_hash: "sha256:1094e0af03f6b6383aee9c5bbc46f629ab94d04b2f949d01621ad54195f1b744"
      - ref: "§ 9, stk. 2"
        text_hash: "sha256:74176e8a44dc7c34034445ee127cbace3ee8a739c979ab4473b0696e62e17c24"
    severity: hard_stop
    machine_rule:
      require:
        - transaction_date
        - amount
        - text
        - import_batch_id
        - source_file_hash
        - deterministic_transaction_fingerprint
      forbid:
        - duplicate_transaction_fingerprint_in_same_company
    explanation: Rentemester must import bank transactions with enough metadata to support prompt registration, control trail, and deterministic deduplication.
  - rule_id: DK-BOOKKEEPING-RECONCILIATION-001
    name: Bank reconciliation must show matched and unmatched imported transactions for a period
    category: reconciliation
    source_id: DK-BOGFORINGSLOVEN-2022-700
    provisions:
      - ref: "§ 11, stk. 1"
        text_hash: "sha256:8a1a2a31b9b0c4e29a1b74f5433907f26f276c95348950c907dc5e8f758f1eea"
      - ref: "§ 11, stk. 2"
        text_hash: "sha256:f1dbf1b26e1f7c42ffe6cc0e2423805597ec76298b176c235e80c6c033cf5027"
    severity: hard_stop
    machine_rule:
      require:
        - period_start
        - period_end
        - matched_bank_transactions
        - unmatched_bank_transactions
        - traceable_links_to_journal_entries
    explanation: Rentemester must be able to deterministically reconcile imported bank transactions against posted journal entries so reporting has an updated control basis.
  - rule_id: DK-BOOKKEEPING-FX-001
    name: Non-DKK transaction imports must record the transaction-day exchange factor and DKK amount
    category: transaction_registration
    source_id: DK-DIGITAL-BOGFORING-NONREGISTERED-2024-205
    provisions:
      - ref: "§ 3, stk. 1, nr. 5"
        text_hash: "sha256:4942141d8251a4f870a7c7088a85075ab81f13d16d754ed5bba84157f7524289"
    severity: hard_stop
    machine_rule:
      require:
        - foreign_currency_code
        - transaction_day_exchange_rate_or_conversion_factor
        - dkk_converted_amount
      forbid:
        - non_dkk_registration_without_conversion_basis
    explanation: When a transaction is registered in another currency than DKK, Rentemester must persist the currency, the conversion factor used on the transaction day, and the DKK amount used in the bookkeeping trail.
  - rule_id: DK-BOOKKEEPING-BACKUP-001
    name: The system must support weekly full backups of booked transactions and supporting documents
    category: backup_compliance
    source_id: DK-DIGITAL-BOGFORING-NONREGISTERED-2024-205
    provisions:
      - ref: "§ 4, stk. 1"
        text_hash: "sha256:96235d331f5562c3334b1ae7b4cf25a44ed1593abcdb75808c9c896b4709c7e2"
    severity: hard_stop
    machine_rule:
      require:
        - full_backup_of_ledger_snapshot
        - full_backup_of_supporting_documents
        - backup_manifest_with_timestamp_and_hashes
        - compliance_status_for_latest_backup_age
      forbid:
        - silently_missing_backup_after_more_than_7_days_with_new_activity
    explanation: Rentemester must be able to create a full backup of bookkeeping data and supporting documents and deterministically report when the weekly backup duty has become due because new activity happened after the last backup.
  - rule_id: DK-BOOKKEEPING-BACKUP-DEST-001
    name: The weekly backup must be stored with an independent third party on an EU/EEA server
    category: backup_compliance
    source_id: DK-DIGITAL-BOGFORING-NONREGISTERED-2024-205
    provisions:
      - ref: "§ 4, stk. 2"
        text_hash: "sha256:b85c8e4e92f71426a4901c2b3db689fb5727c1fbc651341c3754ab414bc2e1c3"
      - ref: "§ 4, stk. 3"
        text_hash: "sha256:ac5b673b75c0b10f2bb72e473524974a06bb11ba6a59dd6111233e2a50726752"
    severity: hard_stop
    machine_rule:
      require:
        - destination_attested_in_eea_or_eu
        - destination_attested_non_related_party
        - destination_attested_it_security_standards
        - destination_attestation_signed_by_human
      forbid:
        - placement_to_destination_failing_any_attestation
        - silent_self_attestation_by_agent
    explanation: Rentemester cannot itself know in which country a cloud folder physically sits, who the third party is, or whether they meet recognised IT-security standards. § 4 stk. 2 is therefore enforced as a human-signed attestation per destination (regionAttestation.inEeaOrEu, nonRelatedParty, itSecurityAttestation.meetsRecognisedStandards), checked by isCompliantDestination() before a backup placement is allowed. Stk. 3 is acknowledged but Rentemester's segment (non-registered, no other backup-mandate lex specialis) does not currently surface the exception as a setting.
  - rule_id: DK-BOOKKEEPING-BACKUP-KEY-ROTATE-001
    name: Rotation of the Ed25519 backup signing key must be auditable and preserve the verifiability of older backups
    category: backup_compliance
    source_id: DK-DIGITAL-BOGFORING-NONREGISTERED-2024-205
    provisions:
      - ref: "§ 4, stk. 1"
        text_hash: "sha256:96235d331f5562c3334b1ae7b4cf25a44ed1593abcdb75808c9c896b4709c7e2"
    severity: hard_stop
    machine_rule:
      require:
        - explicit_reason_for_each_key_rotation
        - audit_log_entry_naming_old_and_new_public_key_fingerprints
        - archived_old_keypair_preserved_so_older_backups_remain_verifiable
      forbid:
        - silent_overwrite_of_the_existing_signing_key
        - rotation_without_a_recorded_reason
    explanation: When the backup signing key is rotated, Rentemester archives the old keypair under a fingerprint-named filename, writes a fresh keypair to the live path, and audit-logs both fingerprints together with the operator's reason — so an auditor can always reconstruct which key signed a given older backup and why the rotation happened.
  - rule_id: DK-BOOKKEEPING-AUTHORITY-EXPORT-001
    name: Bookkeeping data and vouchers must be exportable by period in a structured machine-readable package
    category: authority_access
    source_id: DK-DIGITAL-STANDARD-BOGFORING-2023-97
    provisions:
      - ref: "§ 11, stk. 1"
        text_hash: "sha256:8c2cf1c123a83815fa39664078be94665fd9a42117117589ea4916c6a1a75168"
      - ref: "§ 11, stk. 4"
        text_hash: "sha256:153ceb54fd0d35ab2e160b801275b279f7549c708442dea40b97c8fee949340f"
    severity: hard_stop
    machine_rule:
      require:
        - period_bounded_export_request
        - machine_readable_journal_export
        - readable_document_copies
        - export_manifest_with_request_timestamp_and_deadline
      forbid:
        - authority_export_without_period_filter
    explanation: Rentemester must be able to assemble bookkeeping transactions and related vouchers for a requested period in a structured machine-readable format, alongside readable document files and a traceable deadline for a four-week authority handover flow.
  - rule_id: DK-BOOKKEEPING-SAFT-EXPORT-001
    name: SAF-T export packages must be deterministic and period-bounded
    category: authority_access
    source_id: DK-DIGITAL-STANDARD-BOGFORING-2023-97
    provisions:
      - ref: "§ 11, stk. 4"
        text_hash: "sha256:153ceb54fd0d35ab2e160b801275b279f7549c708442dea40b97c8fee949340f"
    severity: hard_stop
    machine_rule:
      require:
        - period_bounded_export_request
        - deterministic_package_name
        - machine_readable_saft_xml
        - export_manifest_with_file_hashes
        - explicit_out_of_scope_sections
      forbid:
        - saft_export_without_period_filter
        - non_deterministic_manifest_output
    explanation: Rentemester must assemble the first SAF-T export slice as a deterministic, period-bounded package with XML, manifest hashes, and clear scope boundaries so the output is auditable and reproducible.
  - rule_id: DK-BOOKKEEPING-RESTORE-001
    name: Backup material must be restorable into a readable company dataset
    category: restore_compliance
    source_id: DK-DIGITAL-STANDARD-BOGFORING-2023-97
    provisions:
      - ref: "§ 10, stk. 1"
        text_hash: "sha256:0d661a26b4a119434b39fbbc4141dfc4072d2ea213a875074375631b2281b22f"
    severity: hard_stop
    machine_rule:
      require:
        - backup_manifest_verification_before_restore
        - restored_ledger_snapshot
        - restored_supporting_documents
        - restored_config_and_invoice_files
      forbid:
        - restore_from_hash_mismatched_backup_material
    explanation: Rentemester must be able to restore backed-up bookkeeping material into a readable company dataset, validating the manifest and file hashes first so the regnskabsmateriale can actually be reconstructed.
  - rule_id: DK-BOOKKEEPING-PERIOD-LOCK-001
    name: Journal postings must stay out of closed periods and must not be future-dated
    category: period_control
    source_id: DK-DIGITAL-BOGFORING-NONREGISTERED-2024-205
    provisions:
      - ref: "§ 3, stk. 3"
        text_hash: "sha256:f2f6051f39c51e7648eb8286279a659a1b256ada672d6d106a7634a4297815c5"
    severity: hard_stop
    machine_rule:
      require:
        - transaction_date_not_in_closed_or_reported_period
        - transaction_date_not_after_current_business_date
      forbid:
        - mutation_inside_closed_period
        - future_dated_journal_posting
    explanation: Rentemester must block postings whose transaction date falls inside a closed or reported accounting period, and must also reject future-dated journal entries so historical VAT and bookkeeping periods stay stable.
  - rule_id: DK-BOOKKEEPING-RETENTION-001
    name: Supporting material must carry a retention deadline from the end of the fiscal year plus five years
    category: retention_control
    source_id: DK-BOGFORINGSLOVEN-2022-700
    provisions:
      - ref: "§ 12, stk. 1"
        text_hash: "sha256:b60a0cb777f5b3d28d2659a58bc881073b5e3d6913828e279903bd0fff38ae1f"
    severity: hard_stop
    machine_rule:
      require:
        - retain_until_on_documents
        - retain_until_on_journal_entries
        - retain_until_on_bank_transactions
        - retention_status_report_by_as_of_date
      forbid:
        - silent_missing_retention_deadline
    explanation: Rentemester must track a deterministic retention deadline for bookkeeping material based on the end of the fiscal year the material relates to, and surface overdue material without deleting it automatically.
  # ===== FIXED ASSETS (#124, #125) =====
  - rule_id: DK-ASSET-DEPR-001
    name: Fixed-asset depreciation must post deterministic, balanced period entries linked to the purchase
    category: ledger_validation
    source_id: DK-BOGFORINGSLOVEN-2022-700
    provisions:
      - ref: "§ 7, stk. 1"
        text_hash: "sha256:1094e0af03f6b6383aee9c5bbc46f629ab94d04b2f949d01621ad54195f1b744"
      - ref: "§ 9, stk. 1"
        text_hash: "sha256:75acd88eca28d81d86de2d14ed3c3871304f3e4da3cffc0920be43322a96153a"
    severity: hard_stop
    machine_rule:
      require:
        - deterministic_linear_depreciation_schedule
        - balanced_depreciation_journal_entry
        - depreciation_entry_linked_to_purchase_document
      forbid:
        - duplicate_period_depreciation_posting
    explanation: Rentemester assists the bookkeeping workflow by capitalising an asset and posting deterministic, balanced depreciation entries that stay linked to the original purchase documentation; the user/advisor remains responsible for choosing the depreciation plan and tax treatment.
  - rule_id: DK-ASSET-WRITEOFF-001
    name: Immediate small-asset write-off requires explicit confirmation and source-backed rule metadata
    category: ledger_validation
    source_id: DK-BOGFORINGSLOVEN-2022-700
    provisions:
      - ref: "§ 9, stk. 1"
        text_hash: "sha256:75acd88eca28d81d86de2d14ed3c3871304f3e4da3cffc0920be43322a96153a"
    severity: hard_stop
    machine_rule:
      require:
        - explicit_immediate_writeoff_confirmation
        - source_backed_threshold_rule_metadata
        - balanced_writeoff_journal_entry
        - purchase_documentation_attached
      forbid:
        - immediate_writeoff_without_confirmation
        - immediate_writeoff_when_eligibility_uncertain_without_exception
    explanation: Rentemester assists the straksafskrivning workflow by booking a balanced write-off entry only when the user/advisor explicitly confirms it and supplies a source for the applied threshold rule; when documentation is missing or eligibility is uncertain it raises an exception instead of posting, and the user/advisor owns the tax treatment.
  # ===== ACCRUALS / PERIODEAFGRÆNSNINGSPOSTER =====
  - rule_id: DK-BOOKKEEPING-ACCRUAL-001
    name: Accruals must register a balanced parking entry and recognise it through deterministic balanced period entries
    category: ledger_validation
    source_id: DK-BOGFORINGSLOVEN-2022-700
    provisions:
      - ref: "§ 7, stk. 1"
        text_hash: "sha256:1094e0af03f6b6383aee9c5bbc46f629ab94d04b2f949d01621ad54195f1b744"
    severity: hard_stop
    machine_rule:
      require:
        - balanced_accrual_registration_entry
        - deterministic_even_period_recognition_schedule
        - balanced_recognition_journal_entry_per_period
        - recognition_schedule_sums_exactly_to_registered_amount
      forbid:
        - duplicate_period_recognition_posting
        - recognition_total_exceeding_registered_accrual_amount
    explanation: Rentemester assists the periodeafgrænsning workflow by parking a prepaid/accrued cost or deferred revenue on a balance-sheet accrual account with one balanced registration entry, then recognising it onto the income statement through deterministic, balanced per-period entries that split the amount evenly (the final period carries the øre remainder) so the schedule reconciles exactly to the registered amount; every entry stays append-only and a wrong accrual is corrected by reversal, while the user/advisor owns the choice of period split and accounts.
  # ===== PAYABLES / KREDITORSTYRING =====
  - rule_id: DK-PAYABLE-001
    name: A registered supplier bill must be a traceable, balanced open creditor item
    category: ledger_validation
    source_id: DK-BOGFORINGSLOVEN-2022-700
    provisions:
      - ref: "§ 9, stk. 1"
        text_hash: "sha256:75acd88eca28d81d86de2d14ed3c3871304f3e4da3cffc0920be43322a96153a"
      - ref: "§ 9, stk. 2"
        text_hash: "sha256:74176e8a44dc7c34034445ee127cbace3ee8a739c979ab4473b0696e62e17c24"
    severity: hard_stop
    machine_rule:
      require:
        - purchase_document_reference
        - bill_date_and_due_date
        - balanced_creditor_recognition_journal_entry
        - trade_creditor_liability_credited
      forbid:
        - duplicate_payable_for_same_purchase_document
        - payable_recognition_without_purchase_document
    explanation: Rentemester registers a booked supplier bill as an open creditor item by posting a balanced recognition entry (debit expense plus deductible input VAT, credit the trade-creditor liability account), keyed one-to-one to the underlying purchase document so the same bill is never registered twice.
  - rule_id: DK-PAYABLE-PAYMENT-001
    name: Payable payments must be traceably applied against open creditor items and bank transactions
    category: ledger_validation
    source_id: DK-BOGFORINGSLOVEN-2022-700
    provisions:
      - ref: "§ 9, stk. 1"
        text_hash: "sha256:75acd88eca28d81d86de2d14ed3c3871304f3e4da3cffc0920be43322a96153a"
      - ref: "§ 11, stk. 1"
        text_hash: "sha256:8a1a2a31b9b0c4e29a1b74f5433907f26f276c95348950c907dc5e8f758f1eea"
    severity: hard_stop
    machine_rule:
      require:
        - open_payable_reference
        - outgoing_bank_transaction_reference
        - balanced_settlement_journal_entry
        - immutable_payment_application
      forbid:
        - payment_application_above_open_payable_balance
        - reuse_of_already_applied_bank_transaction
    explanation: Rentemester settles an open creditor item by matching one outgoing bank transaction, posting a balanced settlement entry (debit the trade-creditor liability account, credit the bank account) and recording an immutable payment application that never exceeds the payable's open balance.
